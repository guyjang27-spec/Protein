<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>Protein Tracker Pro</title><script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4 flex justify-center">
    <div class="w-full max-w-md bg-white p-6 rounded-2xl shadow-lg space-y-4">
        <h1 class="text-xl font-bold text-center text-blue-600">🥩 Protein Tracker Pro</h1>
        <input type="date" id="dateInput" class="w-full border p-2 rounded">
        
        <!-- ส่วนค้นหาและคำนวณ -->
        <div class="relative">
            <input type="text" id="foodInput" placeholder="พิมพ์ชื่ออาหาร..." class="w-full border p-2 rounded bg-gray-50">
            <ul id="suggestionList" class="absolute z-50 w-full bg-white border shadow-lg hidden max-h-48 overflow-y-auto"></ul>
        </div>
        <div class="grid grid-cols-2 gap-2">
            <input type="number" id="weightInput" placeholder="ปริมาณ (กรัม/มล)" class="border p-2 rounded">
            <button id="calcBtn" class="bg-blue-500 text-white rounded font-bold">คำนวณ</button>
        </div>
        <input type="number" step="0.1" id="proteinInput" placeholder="โปรตีน (g)" class="w-full border p-2 rounded text-blue-600 font-bold">
        <button id="saveBtn" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold">💾 บันทึก</button>

        <!-- ส่วนเพิ่มอาหารใหม่ -->
        <div class="mt-8 p-4 bg-gray-100 rounded-xl">
            <h3 class="font-bold text-gray-700">➕ เพิ่มอาหารใหม่ลง DB</h3>
            <input type="text" id="newFoodName" placeholder="ชื่ออาหาร" class="w-full border p-2 mt-2 rounded">
            <div class="grid grid-cols-2 gap-2 mt-2">
                <input type="number" id="newWeight" placeholder="ปริมาณที่กิน (g)" class="border p-2 rounded">
                <input type="number" id="newProtein" placeholder="โปรตีนที่ได้ (g)" class="border p-2 rounded">
            </div>
            <button id="addDbBtn" class="w-full bg-purple-500 text-white py-2 mt-2 rounded font-bold">คำนวณและเพิ่มลง DB</button>
        </div>
    </div>

    <script>
        const URL = "ใส่ URL ของพี่ที่นี่"; 
        let proteinDB = [];

        // โหลดข้อมูล
        async function loadData() {
            const res = await fetch(URL);
            const d = await res.json();
            proteinDB = d.db;
        }

        // ระบบพิมพ์ค้นหา
        document.getElementById('foodInput').addEventListener('input', function() {
            const list = document.getElementById('suggestionList');
            const matches = proteinDB.filter(i => i.name.includes(this.value));
            list.innerHTML = matches.map(i => `<li class="p-2 border-b cursor-pointer hover:bg-blue-100" onclick="selectFood('${i.name}')">${i.name}</li>`).join('');
            list.classList.toggle('hidden', matches.length === 0);
        });

        function selectFood(name) {
            document.getElementById('foodInput').value = name;
            document.getElementById('suggestionList').classList.add('hidden');
        }

        // คำนวณ
        document.getElementById('calcBtn').onclick = () => {
            const item = proteinDB.find(i => i.name === document.getElementById('foodInput').value);
            if(item) document.getElementById('proteinInput').value = ((item.value * document.getElementById('weightInput').value)/100).toFixed(1);
            else alert("ไม่พบอาหารนี้ เลือกจากรายการที่เด้งขึ้นมานะครับ");
        };

        // เพิ่มอาหารใหม่
        document.getElementById('addDbBtn').onclick = async () => {
            const pPer100 = (parseFloat(document.getElementById('newProtein').value) * 100) / parseFloat(document.getElementById('newWeight').value);
            await fetch(URL, { method: "POST", body: JSON.stringify({ action: 'add_to_db', foodName: document.getElementById('newFoodName').value, proteinPer100: pPer100.toFixed(1) }) });
            alert("เพิ่มเรียบร้อย!"); location.reload();
        };

        loadData();
    </script>
</body>
</html>
