<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Protein Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 flex flex-col items-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 space-y-6">
        <h1 class="text-2xl font-bold text-blue-600 text-center">🥩 AI Protein Tracker</h1>
        
        <form id="trackerForm" class="space-y-4">
            <input type="date" id="dateInput" class="w-full rounded-lg border-gray-300 p-2 bg-gray-50 border" required>
            
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="targetInput" value="140" class="w-full rounded-lg border-gray-300 p-2 bg-gray-50 border" required>
                <input type="text" id="remainingInput" value="140" class="w-full rounded-lg border-gray-300 p-2 bg-gray-50 border font-bold" readonly>
            </div>

            <input type="text" id="foodInput" placeholder="เช่น อกไก่ต้ม" class="w-full rounded-lg border-gray-300 p-2 bg-gray-50 border" required>
            
            <div id="calcWeightSection" class="space-y-2">
                <input type="number" step="0.1" id="weightInput" placeholder="ปริมาณอาหาร (g/ml)" class="w-full rounded-lg border-gray-300 p-2 bg-gray-50 border">
                <button type="button" id="calcBtn" class="w-full bg-blue-500 text-white p-2 rounded-lg font-semibold hover:bg-blue-600">วิเคราะห์ด้วย AI</button>
            </div>

            <div id="resultBox" class="hidden p-4 bg-blue-50 rounded-xl border border-blue-200">
                <p class="text-3xl font-bold text-blue-600 text-center"><span id="calculatedProtein">0</span> g</p>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-green-500 text-white p-3 rounded-xl font-bold hover:bg-green-600">บันทึกมื้ออาหาร</button>
        </form>
        <div id="dailySummaryList" class="space-y-2"></div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzAax5FyBhIuy8HmaEjxRALlMEuTeWTHT3ROcIKGqsmBOwRcsJYTgT1fmqVRHK-eoop7A/exec";
        document.getElementById('dateInput').valueAsDate = new Date();

        document.getElementById('calcBtn').addEventListener('click', async () => {
            const food = document.getElementById('foodInput').value;
            const weight = document.getElementById('weightInput').value;
            const btn = document.getElementById('calcBtn');
            
            btn.innerText = "🤖 AI กำลังวิเคราะห์...";
            const callbackName = 'aiCb_' + Math.round(100000 * Math.random());
            
            window[callbackName] = (val) => {
                document.getElementById('calculatedProtein').innerText = val;
                document.getElementById('resultBox').classList.remove('hidden');
                btn.innerText = "วิเคราะห์ด้วย AI";
                delete window[callbackName];
            };
            
            const s = document.createElement('script');
            s.src = `${GOOGLE_SCRIPT_URL}?callback=${callbackName}&action=ai&food=${encodeURIComponent(food)}&weight=${weight}`;
            document.body.appendChild(s);
        });

        document.getElementById('trackerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                date: document.getElementById('dateInput').value,
                foodName: document.getElementById('foodInput').value,
                protein: document.getElementById('calculatedProtein').innerText,
                weight: document.getElementById('weightInput').value
            };
            await fetch(GOOGLE_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
            alert("บันทึกแล้ว!");
        });
    </script>
</body>
</html>
