<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Protein Tracker (Daily Cloud v2.1 - Analytics)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 flex flex-col items-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 space-y-6">
        <!-- ส่วนหัว -->
        <div class="text-center">
            <h1 class="text-2xl font-bold text-blue-600">🥩 AI Protein Tracker</h1>
            <p class="text-xs text-gray-500">คำนวณวันต่อวัน • รองรับของเหลว (ml) • ทศนิยม 1 ตำแหน่ง</p>
            <span id="syncStatus" class="inline-block mt-2 px-2 py-0.5 text-[10px] font-semibold bg-blue-100 text-blue-800 rounded-full">☁️ เชื่อมต่อระบบ Cloud</span>
        </div>

        <!-- ฟอร์มกรอกข้อมูล -->
        <form id="trackerForm" class="space-y-4">
            <!-- วันที่ -->
            <div>
                <label class="block text-sm font-semibold text-gray-700">📅 วันที่บันทึกข้อมูล</label>
                <input type="date" id="dateInput" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-2 bg-gray-50 focus:ring-blue-500 focus:border-blue-500 border" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <!-- Target (เป้าหมายโปรตีน ปรับเป็น Default 140) -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700">🎯 เป้าหมายวันนี้ (g)</label>
                    <input type="number" id="targetInput" value="140" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-2 bg-gray-50 border" required>
                </div>
                <!-- โปรตีนที่เหลือ -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700">⏳ ขาดอีกวันนี้ (g)</label>
                    <input type="text" id="remainingInput" value="140" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-2 bg-gray-50 border font-bold" readonly>
                </div>
            </div>

            <!-- ชนิดอาหาร -->
            <div>
                <label class="block text-sm font-semibold text-gray-700">✍️ ชนิดอาหาร / เครื่องดื่ม</label>
                <input type="text" id="foodInput" placeholder="เช่น อกไก่ต้ม, นมโปรตีน, นมจืด" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-2 bg-gray-50 border focus:ring-blue-500 focus:border-blue-500" required>
            </div>

            <!-- ทางเลือก: ระบุโปรตีนเอง -->
            <div class="flex items-center space-x-2 bg-blue-50 p-2.5 rounded-lg border border-blue-100">
                <input type="checkbox" id="manualProteinToggle" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                <label for="manualProteinToggle" class="text-xs font-semibold text-blue-800 cursor-pointer select-none">
                    ✨ รู้ปริมาณโปรตีนอยู่แล้ว (ไม่ต้องคำนวณปริมาณ)
                </label>
            </div>

            <!-- โหมดคำนวณตามปริมาณ -->
            <div id="calcWeightSection" class="space-y-2">
                <div class="flex justify-between items-center">
                    <label class="block text-sm font-semibold text-gray-700">⚖️ ปริมาณอาหาร / เครื่องดื่ม</label>
                    <div class="inline-flex rounded-md shadow-sm text-xs">
                        <button type="button" id="unitGBtn" class="px-3 py-1 bg-blue-600 text-white rounded-l-md font-semibold">กรัม (g)</button>
                        <button type="button" id="unitMlBtn" class="px-3 py-1 bg-gray-200 text-gray-700 rounded-r-md font-semibold hover:bg-gray-300">มิลลิลิตร (ml)</button>
                    </div>
                </div>
                <div class="flex space-x-2">
                    <input type="number" step="0.1" id="weightInput" placeholder="กรอกปริมาณ เช่น 150.5" class="block w-full rounded-lg border-gray-300 shadow-sm p-2 bg-gray-50 border">
                    <button type="button" id="calcBtn" class="bg-blue-500 text-white px-4 py-2 rounded-lg font-semibold hover:bg-blue-600 transition">วิเคราะห์</button>
                </div>
            </div>

            <!-- กรอกโปรตีนตรงๆ -->
            <div id="directProteinSection" class="space-y-2 hidden">
                <label class="block text-sm font-semibold text-gray-700">💪 ระบุปริมาณโปรตีนโดยตรง (กรัม)</label>
                <input type="number" step="0.1" id="directProteinInput" placeholder="กรอกตัวเลข เช่น 25.5" class="block w-full rounded-lg border-gray-300 shadow-sm p-2 bg-gray-50 border">
            </div>

            <!-- ผลลัพธ์จากการวิเคราะห์ -->
            <div id="resultBox" class="hidden p-4 bg-blue-50 rounded-xl border border-blue-200">
                <p class="text-sm text-blue-800 font-semibold">🔍 ยอดโปรตีนที่จะบันทึก:</p>
                <div class="flex justify-between items-baseline mt-1">
                    <p class="text-3xl font-bold text-blue-600"><span id="calculatedProtein">0</span> <span class="text-lg">กรัม</span></p>
                    <p id="ratioText" class="text-xs text-blue-500">ใช้สัดส่วน: <span id="usedRatio">0</span>%</p>
                </div>
            </div>

            <!-- ปุ่มบันทึก -->
            <button type="submit" id="submitBtn" class="w-full bg-green-500 text-white p-3 rounded-xl font-bold hover:bg-green-600 transition shadow-md flex justify-center items-center">
                <span id="btnText">💾 บันทึกมื้ออาหารลง Cloud</span>
            </button>
        </form>

        <hr class="border-gray-200">

        <!-- รายการที่บันทึกของวันที่เลือก -->
        <div>
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-base font-bold text-gray-700">📋 รายการกินวันนี้ <span class="text-blue-600 text-sm" id="selectedDateLabel"></span></h2>
                <button id="refreshBtn" class="text-xs text-blue-500 hover:text-blue-700 font-semibold">🔄 ดึงข้อมูลใหม่</button>
            </div>
            <div id="historyList" class="space-y-2 max-h-48 overflow-y-auto mb-4">
                <p class="text-sm text-gray-400 text-center py-4">กำลังโหลดข้อมูลจาก Google Sheets...</p>
            </div>
        </div>

        <hr class="border-gray-200">

        <!-- 📊 ส่วนที่เพิ่มใหม่: สรุปยอดโปรตีนรวมในแต่ละวัน -->
        <div>
            <h2 class="text-base font-bold text-gray-700 mb-3">📊 สรุปยอดโปรตีนรวมแยกตามวัน</h2>
            <div id="dailySummaryList" class="space-y-2 max-h-48 overflow-y-auto">
                <p class="text-sm text-gray-400 text-center py-2">ไม่มีข้อมูลสรุป</p>
            </div>
        </div>
    </div>

    <script>
        const foodDatabase = [
            { keywords: ["อกไก่", "อกไก่ต้ม", "อกไก่นึ่ง"], ratio: 0.30 },
            { keywords: ["สะโพกไก่", "น่องไก่"], ratio: 0.25 },
            { keywords: ["หมูกระเทียม", "หมูทอดกระเทียม"], ratio: 0.24 },
            { keywords: ["หมูหมัก", "หมูชิ้น", "หมูแดง", "หมูต้ม", "หมูตุ๋น"], ratio: 0.23 },
            { keywords: ["คอหมู", "คอหมูย่าง"], ratio: 0.18 },
            { keywords: ["ปลากรอบ", "ปลาจิ้งจัง"], ratio: 0.32 },
            { keywords: ["ลูกชิ้นปลา", "ลูกชิ้น"], ratio: 0.11 },
            { keywords: ["หมึกกระเทียม", "ปลาหมึกผัดกระเทียม", "หมึก"], ratio: 0.17 },
            { keywords: ["ไข่กระทะ", "ไข่ดาว"], ratio: 0.13 },
            { keywords: ["กึ๋น", "ไส้กึ๋น"], ratio: 0.21 },
            { keywords: ["เลือดเป็ด", "เลือดหมู"], ratio: 0.09 },
            { keywords: ["นมโปรตีน", "เวย์พร้อมดื่ม"], ratio: 0.08 },
            { keywords: ["นม", "นมจืด", "นมวัว", "นมถั่วเหลือง", "ดีมอลต์", "โอวัลติน"], ratio: 0.034 } 
        ];
        const defaultRatio = 0.20;

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzAax5FyBhIuy8HmaEjxRALlMEuTeWTHT3ROcIKGqsmBOwRcsJYTgT1fmqVRHK-eoop7A/exec";

        document.getElementById('dateInput').valueAsDate = new Date();

        let currentCalculatedProtein = 0;
        let allRecords = [];
        let isManualMode = false;
        let currentUnit = "g";

        const toggleBtn = document.getElementById('manualProteinToggle');
        const calcWeightSection = document.getElementById('calcWeightSection');
        const directProteinSection = document.getElementById('directProteinSection');
        const resultBox = document.getElementById('resultBox');
        const ratioText = document.getElementById('ratioText');
        const dateInput = document.getElementById('dateInput');
        
        const unitGBtn = document.getElementById('unitGBtn');
        const unitMlBtn = document.getElementById('unitMlBtn');

        unitGBtn.addEventListener('click', () => {
            currentUnit = "g";
            unitGBtn.className = "px-3 py-1 bg-blue-600 text-white rounded-l-md font-semibold";
            unitMlBtn.className = "px-3 py-1 bg-gray-200 text-gray-700 rounded-r-md font-semibold hover:bg-gray-300";
            document.getElementById('weightInput').placeholder = "กรอกปริมาณ เช่น 150.5";
        });

        unitMlBtn.addEventListener('click', () => {
            currentUnit = "ml";
            unitMlBtn.className = "px-3 py-1 bg-blue-600 text-white rounded-r-md font-semibold";
            unitGBtn.className = "px-3 py-1 bg-gray-200 text-gray-700 rounded-l-md font-semibold hover:bg-gray-300";
            document.getElementById('weightInput').placeholder = "กรอกปริมาตร เช่น 250.0";
        });

        function fetchRecordsFromCloud() {
            const statusLabel = document.getElementById('syncStatus');
            statusLabel.innerText = "⏳ กำลังดึงข้อมูลจาก Cloud...";
            statusLabel.className = "inline-block mt-2 px-2 py-0.5 text-[10px] font-semibold bg-yellow-100 text-yellow-800 rounded-full";

            const callbackName = 'jsonpCallback_' + Math.round(100000 * Math.random());
            window[callbackName] = function(data) {
                const targetInput = document.getElementById('targetInput');
                
                if (Array.isArray(data)) {
                    allRecords = data;
                } else if (data && data.records) {
                    allRecords = data.records;
                    if (data.targetValue) {
                        targetInput.value = data.targetValue;
                    }
                }
                
                statusLabel.innerText = "☁️ อัปเดตข้อมูลจาก Cloud สำเร็จ";
                statusLabel.className = "inline-block mt-2 px-2 py-0.5 text-[10px] font-semibold bg-green-100 text-green-800 rounded-full";
                
                filterAndRenderByDate();
                renderDailySummary(); // เรียกคำนวณสรุปยอดรายวัน
                
                delete window[callbackName];
                document.getElementById(callbackName).remove();
            };

            const script = document.createElement('script');
            script.id = callbackName;
            script.src = GOOGLE_SCRIPT_URL + (GOOGLE_SCRIPT_URL.includes('?') ? '&' : '?') + 'callback=' + callbackName;
            
            script.onerror = function() {
                statusLabel.innerText = "❌ เชื่อมต่อ Cloud ล้มเหลว";
                statusLabel.className = "inline-block mt-2 px-2 py-0.5 text-[10px] font-semibold bg-red-100 text-red-800 rounded-full";
                document.getElementById('historyList').innerHTML = `<p class="text-sm text-red-500 text-center py-4">ไม่สามารถโหลดข้อมูลได้ ตรวจสอบสิทธิ์สคริปต์ของคุณ</p>`;
            };
            
            document.body.appendChild(script);
        }

        function filterAndRenderByDate() {
            const selectedDate = dateInput.value;
            document.getElementById('selectedDateLabel').innerText = `(${selectedDate})`;

            const target = parseFloat(document.getElementById('targetInput').value) || 140;
            const historyList = document.getElementById('historyList');
            const remainingInput = document.getElementById('remainingInput');

            const filteredRecords = allRecords.filter(record => record.date === selectedDate);
            const totalEatenToday = filteredRecords.reduce((sum, record) => sum + parseFloat(record.protein), 0);
            
            const remainingToday = Math.round((target - totalEatenToday) * 10) / 10;
            remainingInput.value = remainingToday + " g";

            if (remainingToday < 0) {
                remainingInput.className = "mt-1 block w-full rounded-lg border-green-300 shadow-sm p-2 bg-green-50 text-green-700 font-bold border";
            } else {
                remainingInput.className = "mt-1 block w-full rounded-lg border-amber-300 shadow-sm p-2 bg-amber-50 text-amber-700 font-bold border";
            }

            if (filteredRecords.length === 0) {
                historyList.innerHTML = `<p class="text-sm text-gray-400 text-center py-4">📅 ยังไม่มีประวัติการบันทึกของวันนี้</p>`;
                return;
            }

            const sortedRecords = [...filteredRecords].reverse();
            historyList.innerHTML = sortedRecords.map((record) => {
                const formattedWeight = record.weight ? parseFloat(record.weight).toFixed(1) : "";
                const displayWeight = record.isManual ? "ระบุโปรตีนเอง" : `${formattedWeight} ${record.unit || 'g'}`;
                return `
                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg border border-gray-100 text-sm">
                        <div>
                            <span class="font-semibold block text-gray-700">${record.foodName} (${displayWeight})</span>
                        </div>
                        <div class="text-right">
                            <span class="font-bold text-green-600 text-base">+${parseFloat(record.protein).toFixed(1)}g</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ฟังก์ชันคำนวณกลุ่มข้อมูลและแสดงผลสรุปยอดโปรตีนแยกรายวัน
        function renderDailySummary() {
            const summaryList = document.getElementById('dailySummaryList');
            const target = parseFloat(document.getElementById('targetInput').value) || 140;

            if (allRecords.length === 0) {
                summaryList.innerHTML = `<p class="text-sm text-gray-400 text-center py-4">📊 ยังไม่มีข้อมูลบันทึกในระบบ</p>`;
                return;
            }

            // จัดกลุ่มข้อมูลแยกตามวันที่
            const summaryMap = {};
            allRecords.forEach(record => {
                if (!summaryMap[record.date]) {
                    summaryMap[record.date] = 0;
                }
                summaryMap[record.date] += parseFloat(record.protein);
            });

            // แปลงเป็น Array และเรียงลำดับจากวันที่ล่าสุดขึ้นก่อน
            const sortedDates = Object.keys(summaryMap).sort().reverse();

            summaryList.innerHTML = sortedDates.map(date => {
                const totalProtein = Math.round(summaryMap[date] * 10) / 10;
                const isSuccess = totalProtein >= target;
                
                // ตกแต่งสีสรรตามสถานะการกินถึงเป้าหรือไม่
                const badgeColor = isSuccess 
                    ? "bg-green-100 text-green-800 border-green-200" 
                    : "bg-amber-100 text-amber-800 border-amber-200";
                
                const statusText = isSuccess ? "🎯 ถึงเป้าหมาย" : `ขาดอีก ${(target - totalProtein).toFixed(1)}g`;

                return `
                    <div class="flex justify-between items-center p-3 rounded-xl border text-sm ${badgeColor}">
                        <div>
                            <span class="font-bold block">${date}</span>
                            <span class="text-xs opacity-80">${statusText} (เป้าหมาย ${target}g)</span>
                        </div>
                        <div class="text-right">
                            <span class="text-lg font-black">${totalProtein.toFixed(1)} / ${target} g</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        dateInput.addEventListener('change', filterAndRenderByDate);
        document.getElementById('targetInput').addEventListener('input', () => {
            filterAndRenderByDate();
            renderDailySummary();
        });
        document.getElementById('refreshBtn').addEventListener('click', fetchRecordsFromCloud);

        toggleBtn.addEventListener('change', (e) => {
            isManualMode = e.target.checked;
            resultBox.classList.add('hidden');
            currentCalculatedProtein = 0;
            if (isManualMode) {
                calcWeightSection.classList.add('hidden');
                directProteinSection.classList.remove('hidden');
                document.getElementById('weightInput').required = false;
                document.getElementById('directProteinInput').required = true;
            } else {
                calcWeightSection.classList.remove('hidden');
                directProteinSection.classList.add('hidden');
                document.getElementById('weightInput').required = true;
                document.getElementById('directProteinInput').required = false;
            }
        });

        document.getElementById('directProteinInput').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            if (!isNaN(val) && val >= 0) {
                currentCalculatedProtein = Math.round(val * 10) / 10;
                document.getElementById('calculatedProtein').innerText = currentCalculatedProtein.toFixed(1);
                resultBox.classList.remove('hidden');
            } else {
                resultBox.classList.add('hidden');
                currentCalculatedProtein = 0;
            }
        });

        document.getElementById('calcBtn').addEventListener('click', () => {
            const foodText = document.getElementById('foodInput').value;
            const weight = parseFloat(document.getElementById('weightInput').value);
            if (!foodText || isNaN(weight) || weight <= 0) {
                alert("กรุณากรอกข้อมูลอาหารและปริมาณให้ถูกต้องก่อนครับ");
                return;
            }

            let usedRatio = defaultRatio;
            const cleanText = foodText.trim().replace(/\s+/g, '');
            for (let item of foodDatabase) {
                for (let keyword of item.keywords) {
                    if (cleanText.includes(keyword)) { usedRatio = item.ratio; break; }
                }
            }

            currentCalculatedProtein = Math.round((weight * usedRatio) * 10) / 10;
            document.getElementById('calculatedProtein').innerText = currentCalculatedProtein.toFixed(1);
            document.getElementById('usedRatio').innerText = Math.round(usedRatio * 100);
            resultBox.classList.remove('hidden');
        });

        document.getElementById('trackerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const date = dateInput.value;
            const target = parseFloat(document.getElementById('targetInput').value);
            const foodName = document.getElementById('foodInput').value;

            if (isManualMode) {
                currentCalculatedProtein = Math.round(parseFloat(document.getElementById('directProteinInput').value) * 10) / 10;
            } else if (currentCalculatedProtein === 0) {
                alert("กรุณากดปุ่มวิเคราะห์สารอาหารก่อนบันทึกนะครับ");
                return;
            }

            const newRecord = {
                date,
                foodName,
                weight: isManualMode ? null : parseFloat(document.getElementById('weightInput').value),
                protein: currentCalculatedProtein,
                isManual: isManualMode,
                target: target,
                unit: isManualMode ? null : currentUnit
            };

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            
            try {
                submitBtn.disabled = true;
                btnText.innerText = "⏳ กำลังเซฟข้อมูลลง Cloud...";

                await fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(newRecord)
                });

                setTimeout(() => {
                    fetchRecordsFromCloud();
                    document.getElementById('foodInput').value = '';
                    document.getElementById('weightInput').value = '';
                    document.getElementById('directProteinInput').value = '';
                    resultBox.classList.add('hidden');
                    currentCalculatedProtein = 0;
                    if (isManualMode) toggleBtn.click();
                }, 1000);

            } catch (error) {
                alert("บันทึกไม่สำเร็จ ลองอีกครั้งครับ");
            } finally {
                submitBtn.disabled = false;
                btnText.innerText = "💾 บันทึกมื้ออาหารลง Cloud";
            }
        });

        window.onload = fetchRecordsFromCloud;
    </script>
</body>
</html>
