<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>Protein Tracker Pro</title><script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4 flex justify-center">
    <div class="w-full max-w-md bg-white p-6 rounded-2xl shadow-lg space-y-4">
        <h1 class="text-xl font-bold text-center text-blue-600">🥩 Protein Tracker Pro</h1>
        <input type="date" id="dateInput" class="w-full border p-2 rounded">
        
        <div class="relative">
            <input type="text" id="foodInput" placeholder="พิมพ์ชื่ออาหาร..." class="w-full border p-2 rounded bg-gray-50">
            <ul id="suggestionList" class="absolute z-50 w-full bg-white border shadow-lg hidden max-h-48 overflow-y-auto"></ul>
        </div>
        <div class="grid grid-cols-2 gap-2">
            <input type="number" id="weightInput" placeholder="ปริมาณ (กรัม/มล)" class="border p-2 rounded">
            <button id="calcBtn" class="bg-blue-500 text-white rounded font-bold">คำนวณ</button>
        </div>
        <input type="number" step="0.1" id="proteinInput" placeholder="โปรตีน (g)" class="w-full border p-2 rounded text-blue-600 font-bold">
        <button id="saveBtn" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold">💾 บันทึก</button>

        <h2 class="font-bold border-b mt-4">📋 รายการวันนี้</h2>
        <div id="historyList" class="text-sm"></div>
        <div id="summary" class="font-bold text-blue-700 mt-2"></div>
        
        <h2 class="font-bold border-b mt-4">📅 ย้อนหลัง 7 วัน</h2>
        <div id="last7Days" class="text-sm space-y-1 text-gray-600"></div>

        <div class="mt-8 p-4 bg-gray-100 rounded-xl">
            <h3 class="font-bold text-gray-700">➕ เพิ่มอาหารใหม่ลง DB</h3>
            <input type="text" id="newFoodName" placeholder="ชื่ออาหาร" class="w-full border p-2 mt-2 rounded">
            <div class="grid grid-cols-2 gap-2 mt-2">
                <input type="number" id="newWeight" placeholder="ปริมาณที่กิน (g)" class="border p-2 rounded">
                <input type="number" id="newProtein" placeholder="โปรตีนที่ได้ (g)" class="border p-2 rounded">
            </div>
            <button id="addDbBtn" class="w-full bg-purple-500 text-white py-2 mt-2 rounded font-bold">คำนวณและเพิ่มลง DB</button>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzAax5FyBhIuy8HmaEjxRALlMEuTeWTHT3ROcIKGqsmBOwRcsJYTgT1fmqVRHK-eoop7A/exec";
        let proteinDB = [];

        async function fetchData() {
            try {
                const res = await fetch(URL);
                if (!res.ok) throw new Error("ไม่สามารถเชื่อมต่อ Google Sheet ได้");
                const d = await res.json();
                proteinDB = d.db;
                
                const selectedDate = document.getElementById('dateInput').value;
                const history = d.records.filter(r => r.date === selectedDate);
                
                document.getElementById('historyList').innerHTML = history.map(r => 
                    `<div class="flex justify-between border-b py-1"><span>${r.foodName}</span><span>+${parseFloat(r.protein || 0).toFixed(1)}g</span></div>`
                ).join('');
                
                const total = history.reduce((sum, r) => sum + parseFloat(r.protein || 0), 0);
                document.getElementById('summary').innerText = `รวมวันนี้: ${total.toFixed(1)} g`;

                let html = '';
                for (let i = 0; i < 7; i++) {
                    const dObj = new Date(); dObj.setDate(dObj.getDate() - i); 
                    const dStr = dObj.toISOString().split('T')[0];
                    const dailyTotal = d.records.filter(r => r.date === dStr).reduce((sum, r) => sum + parseFloat(r.protein || 0), 0);
                    html += `<div class="flex justify-between py-1 border-b"><span>${dStr}</span><span>${dailyTotal.toFixed(1)}g</span></div>`;
                }
                document.getElementById('last7Days').innerHTML = html;
            } catch (err) {
                console.error(err);
                alert("เกิดข้อผิดพลาดในการโหลดข้อมูล: " + err.message);
            }
        }

        // ตั้งค่าวันที่เริ่มต้นเป็นวันนี้
        document.getElementById('dateInput').valueAsDate = new Date();
        
        // ผูกฟังก์ชันเข้ากับปุ่มและ Event
        document.getElementById('calcBtn').onclick = () => {
            const item = proteinDB.find(i => i.name === document.getElementById('foodInput').value);
            if(item) document.getElementById('proteinInput').value = ((item.value * document.getElementById('weightInput').value)/100).toFixed(1);
            else alert("ไม่พบอาหารนี้ในฐานข้อมูล กรุณาพิมพ์ให้ตรงหรือเพิ่มข้อมูลใหม่");
        };

        document.getElementById('saveBtn').onclick = async () => {
            await fetch(URL, { method: "POST", body: JSON.stringify({ date: document.getElementById('dateInput').value, foodName: document.getElementById('foodInput').value, weight: document.getElementById('weightInput').value, protein: document.getElementById('proteinInput').value, unit: 'g' }) });
            fetchData();
        };

        document.getElementById('dateInput').onchange = fetchData;
        
        // รันครั้งแรก
        fetchData();
    </script>
</body>
</html>
