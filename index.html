<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Protein Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 flex justify-center">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 space-y-4">
        <h1 class="text-xl font-bold text-center">🥩 AI Protein Tracker</h1>
        
        <input type="date" id="dateInput" class="w-full border p-2 rounded">
        <div class="grid grid-cols-2 gap-2">
            <input type="number" id="targetInput" value="140" class="border p-2 rounded" placeholder="เป้าหมาย">
            <input type="text" id="remainingInput" class="border p-2 rounded font-bold text-center" readonly>
        </div>

        <input type="text" id="foodInput" placeholder="ชื่ออาหาร" class="w-full border p-2 rounded">
        <div class="flex items-center gap-2"><input type="checkbox" id="manualToggle"> <label class="text-sm">ระบุโปรตีนเอง</label></div>
        
        <div id="calcSection" class="flex gap-2"><input type="number" id="weightInput" placeholder="ปริมาณ" class="w-full border p-2 rounded"><button id="calcBtn" class="bg-blue-500 text-white px-4 py-2 rounded">AI วิเคราะห์</button></div>
        <div id="manualSection" class="hidden"><input type="number" id="manualProtein" placeholder="โปรตีน (g)" class="w-full border p-2 rounded"></div>
        
        <div id="resultBox" class="hidden bg-blue-50 p-2 text-center font-bold text-blue-700">โปรตีน: <span id="calculatedProtein">0</span> g</div>
        <button id="saveBtn" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold">💾 บันทึก</button>

        <h2 class="font-bold border-b mt-4">📋 รายการวันนี้</h2>
        <div id="historyList" class="text-sm space-y-1"></div>
        <h2 class="font-bold border-b mt-4">📊 สรุปยอดรวม</h2>
        <div id="summaryList" class="text-sm text-gray-600"></div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzAax5FyBhIuy8HmaEjxRALlMEuTeWTHT3ROcIKGqsmBOwRcsJYTgT1fmqVRHK-eoop7A/exec";
        document.getElementById('dateInput').valueAsDate = new Date();

        document.getElementById('manualToggle').onchange = (e) => {
            document.getElementById('manualSection').classList.toggle('hidden', !e.target.checked);
            document.getElementById('calcSection').classList.toggle('hidden', e.target.checked);
        };

        document.getElementById('calcBtn').onclick = async () => {
            const res = await fetch(`${URL}?action=ai&food=${document.getElementById('foodInput').value}&weight=${document.getElementById('weightInput').value}`);
            const p = await res.json();
            document.getElementById('calculatedProtein').innerText = p;
            document.getElementById('resultBox').classList.remove('hidden');
        };

        document.getElementById('saveBtn').onclick = async () => {
            const manual = document.getElementById('manualToggle').checked;
            const data = { date: document.getElementById('dateInput').value, foodName: document.getElementById('foodInput').value, protein: manual ? document.getElementById('manualProtein').value : document.getElementById('calculatedProtein').innerText };
            await fetch(URL, { method: "POST", body: JSON.stringify(data) });
            fetchData();
        };

        async function fetchData() {
            const res = await fetch(URL);
            const d = await res.json();
            const today = document.getElementById('dateInput').value;
            const history = d.records.filter(r => r.date === today);
            document.getElementById('historyList').innerHTML = history.map(r => `<div class="flex justify-between"><span>${r.foodName}</span><span>+${r.protein}g</span></div>`).join('');
            
            const total = history.reduce((sum, r) => sum + parseFloat(r.protein), 0);
            document.getElementById('remainingInput').value = (d.targetValue - total).toFixed(1) + " g";
            document.getElementById('summaryList').innerHTML = `รวมวันนี้: ${total.toFixed(1)} g / ${d.targetValue} g`;
        }
        fetchData();
    </script>
</body>
</html>
