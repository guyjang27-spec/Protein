<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>Protein Tracker Pro</title><script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4 flex justify-center">
    <div class="w-full max-w-md bg-white p-6 rounded-2xl shadow-lg space-y-4">
        <h1 class="text-xl font-bold text-center text-blue-600">🥩 Protein Tracker Pro</h1>
        <input type="date" id="dateInput" class="w-full border p-2 rounded">
        
        <div class="relative">
            <input type="text" id="foodInput" placeholder="พิมพ์ชื่ออาหาร..." class="w-full border p-2 rounded bg-gray-50">
            <ul id="suggestionList" class="absolute z-50 w-full bg-white border shadow-lg hidden max-h-48 overflow-y-auto"></ul>
        </div>

        <input type="number" id="proteinPer100" placeholder="โปรตีนต่อ 100g (g)" class="w-full border p-2 rounded bg-gray-100" readonly>
        
        <div class="grid grid-cols-2 gap-2">
            <input type="number" id="weightInput" placeholder="ปริมาณที่กิน (g)" class="border p-2 rounded">
            <button id="calcBtn" class="bg-blue-500 text-white rounded font-bold">คำนวณ</button>
        </div>
        <input type="number" step="0.1" id="proteinInput" placeholder="โปรตีนรวม (g)" class="w-full border p-2 rounded text-blue-600 font-bold">
        <button id="saveBtn" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold">💾 บันทึก</button>

        <h2 class="font-bold border-b mt-4">📋 รายการวันนี้</h2>
        <div id="historyList" class="text-sm"></div>
        <div id="summary" class="font-bold text-blue-700 mt-2"></div>
        
        <h2 class="font-bold border-b mt-4">📅 ย้อนหลัง 7 วัน</h2>
        <div id="last7Days" class="text-sm space-y-1 text-gray-600"></div>

        <div class="mt-8 p-4 bg-gray-100 rounded-xl">
            <h3 class="font-bold text-gray-700">➕ เพิ่มอาหารใหม่ลง DB</h3>
            <input type="text" id="newFoodName" placeholder="ชื่ออาหาร" class="w-full border p-2 mt-2 rounded">
            <div class="grid grid-cols-2 gap-2 mt-2">
                <input type="number" id="newWeight" placeholder="ปริมาณอ้างอิง (g)" class="border p-2 rounded">
                <input type="number" id="newProtein" placeholder="โปรตีนที่ได้ (g)" class="border p-2 rounded">
            </div>
            <button id="addDbBtn" class="w-full bg-purple-500 text-white py-2 mt-2 rounded font-bold">บันทึกลง DB</button>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzAax5FyBhIuy8HmaEjxRALlMEuTeWTHT3ROcIKGqsmBOwRcsJYTgT1fmqVRHK-eoop7A/exec";
        let proteinDB = [];

        async function fetchData() {
            try {
                const res = await fetch(URL);
                const d = await res.json();
                proteinDB = d.db;
                
                const selectedDate = document.getElementById('dateInput').value;
                const history = d.records.filter(r => String(r.date).trim() === selectedDate);
                
                document.getElementById('historyList').innerHTML = history.map(r => 
                    `<div class="flex justify-between border-b py-1"><span>${r.foodName}</span><span>+${parseFloat(r.protein || 0).toFixed(1)}g</span></div>`
                ).join('');
                
                const total = history.reduce((sum, r) => sum + parseFloat(r.protein || 0), 0);
                document.getElementById('summary').innerText = `รวมวันนี้: ${total.toFixed(1)} g`;

                let html = '';
                for (let i = 0; i < 7; i++) {
                    const dObj = new Date(); dObj.setDate(dObj.getDate() - i); 
                    const dStr = dObj.toISOString().split('T')[0];
                    const dailyTotal = d.records.filter(r => String(r.date).trim() === dStr).reduce((sum, r) => sum + parseFloat(r.protein || 0), 0);
                    html += `<div class="flex justify-between py-1 border-b text-gray-700"><span>${dStr}</span><span>${dailyTotal.toFixed(1)}g</span></div>`;
                }
                document.getElementById('last7Days').innerHTML = html;
            } catch (err) { console.error(err); }
        }

        document.getElementById('foodInput').oninput = function() {
            const val = this.value.toLowerCase();
            const list = document.getElementById('suggestionList');
            const filtered = proteinDB.filter(item => item.name.toLowerCase().includes(val));
            list.innerHTML = filtered.map(item => `<li class="p-2 cursor-pointer hover:bg-blue-100">${item.name}</li>`).join('');
            list.classList.toggle('hidden', filtered.length === 0 || !val);
        };

        document.getElementById('suggestionList').onclick = function(e) {
            const name = e.target.innerText;
            document.getElementById('foodInput').value = name;
            this.classList.add('hidden');
            const item = proteinDB.find(i => i.name === name);
            if(item) document.getElementById('proteinPer100').value = item.value;
        };

        document.getElementById('calcBtn').onclick = () => {
            const p100 = parseFloat(document.getElementById('proteinPer100').value);
            const weight = parseFloat(document.getElementById('weightInput').value);
            if(p100 && weight) document.getElementById('proteinInput').value = ((p100 * weight) / 100).toFixed(1);
        };

        document.getElementById('saveBtn').onclick = async () => {
            const payload = {
                date: document.getElementById('dateInput').value,
                foodName: document.getElementById('foodInput').value,
                weight: document.getElementById('weightInput').value,
                protein: document.getElementById('proteinInput').value,
                unit: 'g'
            };
            await fetch(URL, { method: "POST", body: JSON.stringify(payload) });
            alert("บันทึกรายการเรียบร้อย!");
            fetchData();
        };

        // ฟังก์ชันใหม่ที่อัปเดตแล้ว: บันทึกทั้ง 2 Sheet
        document.getElementById('addDbBtn').onclick = async () => {
            const name = document.getElementById('newFoodName').value;
            const weight = parseFloat(document.getElementById('newWeight').value);
            const protein = parseFloat(document.getElementById('newProtein').value);
            const p100 = (protein * 100) / weight;
            
            await fetch(URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: 'add_to_db', 
                    foodName: name, 
                    weight: weight,
                    protein: protein,
                    proteinPer100: p100 
                })
            });
            alert("เพิ่มอาหารใหม่สำเร็จ! (บันทึกประวัติและอัปเดตฐานข้อมูลแล้ว)");
            document.getElementById('newFoodName').value = '';
            document.getElementById('newWeight').value = '';
            document.getElementById('newProtein').value = '';
            fetchData();
        };

        document.getElementById('dateInput').valueAsDate = new Date();
        document.getElementById('dateInput').onchange = fetchData;
        fetchData();
    </script>
</body>
</html>
